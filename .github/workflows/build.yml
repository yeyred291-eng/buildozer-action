name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lld cmake auto-apt-proxy unzip wget
          pip install --upgrade pip
          pip install "cython<3.0" buildozer

      - name: Force Install Android SDK and SDKmanager
        run: |
          mkdir -p ~/.buildozer/android/platform
          # Wir laden die offiziellen Google-Tools direkt selbst herunter:
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O commandlinetools.zip
          unzip commandlinetools.zip -d ~/.buildozer/android/platform/cmdline-tools
          mv ~/.buildozer/android/platform/cmdline-tools/cmdline-tools ~/.buildozer/android/platform/cmdline-tools/latest
          
          # Hier akzeptieren wir alle Lizenzen vorab, damit aidl installiert werden darf:
          yes | ~/.buildozer/android/platform/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses || true
          ~/.buildozer/android/platform/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk "build-tools;33.0.0" "platforms;android-33" "platform-tools"

      - name: Build APK with Buildozer
        run: |
          # Wir fügen den Pfad zu den Android-Tools direkt hinzu, damit Buildozer sie findet
          export PATH=$PATH:$HOME/.buildozer/android/platform/android-sdk/platform-tools
          buildozer -v android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Kivy-App
          path: .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/myremind/build/outputs/apk/debug/*.apk
