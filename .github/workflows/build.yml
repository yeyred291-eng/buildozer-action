name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.36
        pip install git+https://github.com/kivy/buildozer.git@master

    - name: Build with Buildozer
      env:
        BUILDOZER_WARN_ON_ROOT: 0
      run: |
        # Wir zwingen Buildozer, das perfekte, vorinstallierte SDK/NDK von GitHub zu nutzen
        buildozer android debug --android_sdk_path=$ANDROID_HOME --android_ndk_path=$ANDROID_NDK_HOME
